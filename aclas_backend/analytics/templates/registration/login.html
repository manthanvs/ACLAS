{% extends 'analytics/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-card p-8">
    <h2 class="text-3xl font-bold text-white mb-6 text-center">Login to ACLAS</h2>
    {% if form.errors %}
    <p class="text-red-400 mb-4 text-center">Your username and password didn't match.</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-300 text-sm font-bold mb-2" for="id_username">Username</label>
            <input class="shadow appearance-none border border-gray-600 rounded w-full py-2 px-3 text-gray-200 bg-gray-800 leading-tight focus:outline-none focus:border-blue-500" id="id_username" name="username" type="text" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-300 text-sm font-bold mb-2" for="id_password">Password</label>
            <input class="shadow appearance-none border border-gray-600 rounded w-full py-2 px-3 text-gray-200 bg-gray-800 mb-3 leading-tight focus:outline-none focus:border-blue-500" id="id_password" name="password" type="password" required>
        </div>
        <div class="flex items-center justify-between">
            <button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition" type="submit">
                Sign In
            </button>
        </div>
    </form>
</div>
{% endblock %}
