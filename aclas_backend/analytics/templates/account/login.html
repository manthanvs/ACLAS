{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ACLAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'analytics/aclas.css' %}">
</head>
<body>
<div id="aclas-loader"><div class="loader-ring"></div></div>
<div id="cursor-glow"></div>

<div class="auth-page">
  <!-- Background Orbs -->
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>

  <div class="auth-card fade-in-up">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo-mark">AC</div>
      <h1>ACLAS</h1>
      <p>Adaptive Coding Lifecycle Analytics</p>
    </div>

    <!-- Errors -->
    {% if form.errors %}
    <div class="error-box">Invalid email or password. Please try again.</div>
    {% endif %}

    <!-- Google OAuth -->
    <form action="{% provider_login_url 'google' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-google btn-full">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or sign in with email</span>
      <div class="divider-line"></div>
    </div>

    <!-- Email / Password Form -->
    <form method="POST" action="{% url 'account_login' %}">
      {% csrf_token %}
      <div class="auth-form-fields">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="login" class="form-control" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••••" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="remember" value="True">
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Sign In</button>
      </div>
    </form>

    <div class="auth-footer">
      New to ACLAS? <a href="{% url 'account_signup' %}">Create an account</a>
    </div>
  </div>
</div>

<script src="{% static 'analytics/aclas.js' %}"></script>
</body>
</html>
